name: Update OpenAI Voice Ruleset

on:
  schedule:
    # Avoid GitHub Actions' high-load period at the top of the hour.
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-openai-voice
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Convert and validate OpenAI voice JSON
        run: python scripts/convert_openai_voice.py

      - name: Summarize validation
        if: always()
        shell: bash
        run: |
          echo "## OpenAI Voice updater" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f OpenAI-Voice.status.json ]]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat OpenAI-Voice.status.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No validated status was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check for repository changes
        id: changes
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- OpenAI-Voice.list OpenAI-Voice.status.json)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- OpenAI-Voice.list OpenAI-Voice.status.json
          fi

      - name: Commit validated update or heartbeat
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OpenAI-Voice.list OpenAI-Voice.status.json
          git commit -m "Update OpenAI Voice ruleset status"
          git pull --rebase
          git push
