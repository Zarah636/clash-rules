name: Update OpenAI Voice Ruleset

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Convert OpenAI voice JSON
        run: python scripts/convert_openai_voice.py

      - name: Commit updated ruleset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OpenAI-Voice.list
          git diff --cached --quiet || git commit -m "Update OpenAI Voice ruleset"
          git push
