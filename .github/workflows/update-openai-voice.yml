name: Update OpenAI Voice Ruleset

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-openai-voice
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Convert OpenAI voice JSON
        run: python scripts/convert_openai_voice.py

      - name: Check for ruleset changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- OpenAI-Voice.list; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "OpenAI-Voice.list is already up to date."
          else
            read -r added deleted _ < <(git diff --numstat -- OpenAI-Voice.list)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "added=$added" >> "$GITHUB_OUTPUT"
            echo "deleted=$deleted" >> "$GITHUB_OUTPUT"
            echo "OpenAI-Voice.list changed: +$added, -$deleted."
          fi

      - name: Commit updated ruleset
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          ADDED: ${{ steps.changes.outputs.added }}
          DELETED: ${{ steps.changes.outputs.deleted }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OpenAI-Voice.list
          git commit -m "Update OpenAI Voice ruleset (+$ADDED, -$DELETED)"
          git pull --rebase
          git push
